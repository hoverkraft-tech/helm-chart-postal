---
name: 🚀 Release

on: # yamllint disable-line rule:truthy
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  statuses: write
  security-events: write

jobs:
  check-branches:
    name: Check branches
    runs-on: ubuntu-latest
    steps:
      - name: Check branch
        run: |
          if [[ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]]; then
            echo "This action can only be run on the ${{ github.event.repository.default_branch }} branch"
            exit 1
          fi
          echo "Branch check passed. Proceeding with the release."
  ci:
    needs: check-branches
    name: Continuous Integration
    uses: ./.github/workflows/__shared-ci.yml

  release:
    needs: ci
    name: Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create-release.outputs.tag }}
    steps:
      - id: create-release
        uses: hoverkraft-tech/ci-github-publish/actions/release/create@38963f37ef5be0b6ae84147f542d96d9eb02802b # 0.14.0

  release-chart:
    name: "Release Helm Chart"
    needs: release
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: hoverkraft-tech/ci-github-container/actions/helm/release-chart@e44dc0064b073031aa93d8f0d4aea040a7c3ba7d # 0.29.0
        with:
          chart: postal
          path: ./postal
          tag: ${{ needs.release.outputs.tag }}
          oci-registry: ghcr.io
          oci-registry-password: ${{ secrets.GITHUB_TOKEN }}
          update-tag-paths: .version

      - uses: hoverkraft-tech/ci-github-common/actions/create-and-merge-pull-request@5f11437c716059f30c635f90055060e4ef8b31a0 # 0.28.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: release-chart-${{ needs.release.outputs.tag }}
          title: "ci: release chart ${{ needs.release.outputs.tag }}"
          body: Release app and chart version ${{ needs.release.outputs.tag }}
          commit-message: |
            ci: release chart ${{ needs.release.outputs.tag }}

            [skip ci]
