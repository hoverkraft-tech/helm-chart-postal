---
name: Shared - Continuous Integration for common tasks

on: # yamllint disable-line rule:truthy
  workflow_call:

permissions:
  contents: read

jobs:
  linter:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@5f11437c716059f30c635f90055060e4ef8b31a0 # 0.28.0
    permissions:
      actions: read
      contents: read
      statuses: write
      security-events: write
    with:
      # FIXME: Remove useless linters on next super-linter release
      linter-env: |
        VALIDATE_KUBERNETES_KUBECONFORM=false

  tests-charts:
    name: Tests - Charts
    runs-on: "ubuntu-latest"
    steps:
      - name: Test helm charts
        uses: hoverkraft-tech/ci-github-container/actions/helm/test-chart@e44dc0064b073031aa93d8f0d4aea040a7c3ba7d # 0.29.0
        with:
          helm-repositories: |
            bitnami https://charts.bitnami.com/bitnami
          helm-set: |
            global.railsSecretKey=\$RAILS_SECRET_KEY
            global.signingKey=\$SIGNING_KEY
        env:
          RAILS_SECRET_KEY: ${{ secrets.RAILS_SECRET_KEY }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
