---
name: Shared - Continuous Integration for common tasks

on: # yamllint disable-line rule:truthy
  workflow_call:

permissions: {}

jobs:
  linter:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@f5847cb398fe65d53794e6aba98ebdfa0801f691 # 0.32.0
    permissions:
      actions: read
      contents: read
      statuses: write
      security-events: write
    with:
      # FIXME: Remove useless linters on next super-linter release
      linter-env: |
        VALIDATE_KUBERNETES_KUBECONFORM=false

  tests-charts:
    name: Tests - Charts
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: Test helm charts
        uses: hoverkraft-tech/ci-github-container/actions/helm/test-chart@df8b445f6cc9661dcb282d897d7146a82e5f2960 # 0.31.0
        with:
          helm-repositories: |
            bitnami https://charts.bitnami.com/bitnami
            jetstack https://charts.jetstack.io
          helm-set: |
            global.railsSecretKey=\$RAILS_SECRET_KEY
            global.signingKey=\$SIGNING_KEY
            cert-manager.enabled=true
        env:
          RAILS_SECRET_KEY: ${{ secrets.RAILS_SECRET_KEY }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
