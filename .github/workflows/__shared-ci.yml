---
name: Shared - Continuous Integration for common tasks

on: # yamllint disable-line rule:truthy
  workflow_call:

permissions:
  actions: read
  contents: read
  statuses: write
  security-events: write

jobs:
  linter:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@9a3d71ca9f68bc1061db8ea1442084ac31a0f8bf # 0.23.0
    permissions:
      actions: read
      contents: read
      statuses: write
      security-events: write

  tests-charts:
    name: Tests - Charts
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: Test helm charts
        uses: hoverkraft-tech/ci-github-container/actions/helm/test-chart@00be6bf5e8054d319e621cd8523cc05ca5102462 # 0.25.0
